name: Materialize App Store Connect API Key
description: >
  Decodes a base64-encoded App Store Connect API key (.p8) onto disk and
  exposes its path so downstream actions (notarytool, allowProvisioningUpdates,
  fastlane) can authenticate. The key is written under $RUNNER_TEMP so it is
  wiped automatically when the runner shuts down.

inputs:
  key-base64:
    description: Base64-encoded .p8 file content (the secret value).
    required: true
  key-id:
    description: App Store Connect API Key ID (the alphanumeric identifier shown in the ASC UI).
    required: true
  issuer-id:
    description: App Store Connect API Issuer ID (UUID shown in the ASC UI).
    required: true

outputs:
  key-path:
    description: Absolute path to the materialized .p8 file.
    value: ${{ steps.materialize.outputs.key-path }}
  key-id:
    description: Echo of the key-id input, for convenience when chaining actions.
    value: ${{ inputs.key-id }}
  issuer-id:
    description: Echo of the issuer-id input, for convenience when chaining actions.
    value: ${{ inputs.issuer-id }}

runs:
  using: composite
  steps:
    - name: Decode the ASC API key
      id: materialize
      shell: bash
      env:
        KEY_BASE64: ${{ inputs.key-base64 }}
        KEY_ID: ${{ inputs.key-id }}
      run: |
        set -euo pipefail
        mkdir -p "$RUNNER_TEMP/private_keys"
        KEY_PATH="$RUNNER_TEMP/private_keys/AuthKey_${KEY_ID}.p8"
        echo -n "$KEY_BASE64" | base64 --decode > "$KEY_PATH"
        chmod 600 "$KEY_PATH"
        echo "key-path=$KEY_PATH" >> "$GITHUB_OUTPUT"
