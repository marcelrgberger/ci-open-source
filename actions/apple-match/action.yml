name: Fetch Apple Certificates via fastlane match
description: >
  Reads Developer ID certificates and provisioning profiles from a private
  fastlane match repository and installs them into the runner. Read-only —
  this action never modifies the match repo. Cert and profile creation /
  rotation happens through a separate, manual `fastlane match` invocation
  on a developer machine.

inputs:
  git-url:
    description: >
      Clone URL of the private match repository. SSH form
      `git@github.com:owner/repo.git` is recommended — pair it with an
      SSH agent started from a repo-scoped deploy key (see the
      `release-macos-app.yml` reusable workflow for the canonical setup).
      HTTPS form `https://x:<TOKEN>@github.com/owner/repo.git` is also
      accepted; pass the token via a secret and never inline.
    required: true
  match-password:
    description: The symmetric passphrase that encrypts the match repository contents.
    required: true
  type:
    description: One of `developer_id`, `appstore`, `adhoc`, `development`, or `enterprise`.
    required: false
    default: developer_id
  app-identifiers:
    description: >
      Comma-separated list of bundle IDs to provision. All of them must
      already exist in App Store Connect (registered Bundle IDs).
    required: true
  team-id:
    description: Apple Developer Team ID.
    required: true
  api-key-path:
    description: Path to the ASC API .p8 file (typically the `key-path` output of `apple-asc-key`).
    required: true
  api-key-id:
    description: ASC API Key ID.
    required: true
  api-issuer-id:
    description: ASC API Issuer ID.
    required: true
  keychain-name:
    description: >
      Name of the keychain match should write the cert into. Defaults to the
      login keychain — but if you've already created a temporary build
      keychain via `apple-create-keychain`, point match at that one so all
      identities live in the same place.
    required: false
    default: login
  readonly:
    description: >
      When `true` (default), runs `fastlane match --readonly` — match only
      reads from the match repository and never creates or rotates artefacts.
      Set to `false` for the bootstrap / rotation workflow that runs from
      within the certificate repository itself.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Install fastlane
      shell: bash
      run: |
        set -euo pipefail
        if ! command -v fastlane >/dev/null 2>&1; then
          # macOS runners ship a recent enough Ruby; we pin fastlane to a
          # known-good major. Bumping requires verifying that match's
          # MAC_APP_DIRECT support is still present (it is, from 2.207+).
          gem install fastlane --version "~> 2.220" --no-document
        fi
        fastlane --version

    - name: Run fastlane match
      shell: bash
      env:
        MATCH_GIT_URL: ${{ inputs.git-url }}
        MATCH_PASSWORD: ${{ inputs.match-password }}
        MATCH_TYPE: ${{ inputs.type }}
        MATCH_APP_IDENTIFIERS: ${{ inputs.app-identifiers }}
        MATCH_TEAM_ID: ${{ inputs.team-id }}
        MATCH_API_KEY_PATH: ${{ inputs.api-key-path }}
        MATCH_API_KEY_ID: ${{ inputs.api-key-id }}
        MATCH_API_ISSUER_ID: ${{ inputs.api-issuer-id }}
        MATCH_KEYCHAIN_NAME: ${{ inputs.keychain-name }}
        MATCH_READONLY: ${{ inputs.readonly }}
      run: |
        set -euo pipefail
        # match's `--api_key_path` flag expects a JSON file with the ASC
        # credentials, not a raw .p8 file (despite the misleading flag
        # name). Build the JSON form at runtime from the materialized
        # .p8 and the key/issuer IDs that callers already pass in.
        MATCH_JSON_PATH="$RUNNER_TEMP/asc_match_key.json"
        KEY_FILE="$MATCH_API_KEY_PATH" \
        KEY_ID="$MATCH_API_KEY_ID" \
        ISSUER_ID="$MATCH_API_ISSUER_ID" \
        python3 -c '
        import json, os
        with open(os.environ["KEY_FILE"]) as f:
            key_body = f.read()
        print(json.dumps({
            "key_id": os.environ["KEY_ID"],
            "issuer_id": os.environ["ISSUER_ID"],
            "key": key_body,
            "in_house": False,
        }))
        ' > "$MATCH_JSON_PATH"
        chmod 600 "$MATCH_JSON_PATH"

        # --readonly is the default and load-bearing for CI builds:
        # consumer pipelines must never create or rotate certs/profiles.
        # The bootstrap workflow inside the apple-certificates repo
        # explicitly passes readonly=false to provision new artefacts.
        READONLY_FLAG=()
        if [ "$MATCH_READONLY" = "true" ]; then
          READONLY_FLAG=(--readonly)
        fi
        # `"${arr[@]:-}"` is the bash-3.2-safe array expansion under
        # `set -u` — plain `"${arr[@]}"` is treated as an unbound
        # variable reference when the array is empty.
        fastlane match "$MATCH_TYPE" \
          "${READONLY_FLAG[@]:-}" \
          --git_url "$MATCH_GIT_URL" \
          --app_identifier "$MATCH_APP_IDENTIFIERS" \
          --team_id "$MATCH_TEAM_ID" \
          --api_key_path "$MATCH_JSON_PATH" \
          --keychain_name "$MATCH_KEYCHAIN_NAME" \
          --skip_docs \
          --verbose

        rm -f "$MATCH_JSON_PATH"

    - name: List installed profiles
      shell: bash
      run: |
        echo "Profiles installed in the user-level store:"
        ls -la "$HOME/Library/MobileDevice/Provisioning Profiles" || true
